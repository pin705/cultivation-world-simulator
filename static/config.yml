    yearly_regression_with_identity: 1
    transition_hysteresis: 10
    transition_cooldown_months: 12
    thresholds:
      archenemy: -60
      disliked: -25
      friend: 25
      best_friend: 60
    llm_delta:
      min: -6
      max: 6
    identity_friendliness_floor:
      lovers: 20
      sworn_sibling: 20
      master_apprentice: 10
    action_modes:
      conversation: llm
      talk: llm
      gift: llm
      spar: llm
      gathering: llm
      random_minor_event: llm
    fixed_deltas:
      confess:
        accepted:
          a_to_b: 35
          b_to_a: 25
        rejected:
          a_to_b: -20
          b_to_a: -8
      dual_cultivation:
